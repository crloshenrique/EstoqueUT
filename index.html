<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="imagens/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Unter Tech</title>
    <style>

/* Ajustes para o título do produto apenas no Celular */
@media (max-width: 768px) {
    .nome-produto {
        font-size: 0.85rem !important; /* Diminui o tamanho da fonte */
        line-height: 1.1rem !important; /* Ajusta o espaçamento entre linhas */
        height: 2.2rem !important;      /* Define a altura para exatamente 2 linhas */
        margin-bottom: 0 !important;   /* Remove o espaço abaixo do título */
    }

    /* Remove a linha separadora cinza para eliminar o espaço em branco */
    .info-produto div[style*="height: 1px"] {
        display: none !important;
    }

    /* Reduz o padding interno do card para aproximar as informações */
    .info-produto {
        padding: 10px 15px !important;
    }
}

/* Estilo específico para telas de Computador */
@media (min-width: 768px) {
    .nome-produto {
        margin-top: -4px !important; /* Ajuste o número conforme desejar */
    }
}

#secao-inicio {
    display: flex;
    flex-direction: column;
    align-items: center;    /* Centraliza horizontalmente */
    justify-content: center; /* Centraliza verticalmente (opcional) */
    text-align: center;      /* Centraliza as linhas de texto */
    padding: 20px;
    min-height: 80vh;       /* Faz com que ocupe quase a tela toda para centralizar melhor */
}

#secao-inicio h1 {
    margin-bottom: 5px;
}

#secao-inicio p {
    color: #666;
    max-width: 300px;       /* Evita que o texto fique muito largo em telas grandes */
    margin-top: 15px;
}


/* Animação do ícone de carregamento */
.loader-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 200px; /* Garante que fique centralizado na área de conteúdo */
    width: 100%;
}

.loader {
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3; /* Cor de fundo da trilha */
    border-top: 4px solid var(--accent-color); /* O azul do seu site */
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

        #lista-registros-corpo {
            max-height: 400px; 
            overflow-y: auto;   /* Ativa vertical */
            overflow-x: hidden; /* DESATIVA HORIZONTAL */
            border: 1px solid #eee;
            border-top: none;
            border-radius: 0 0 12px 12px;
            background: #fff;
            width: 100%;        /* Garante que não passe do limite */
            box-sizing: border-box; 
        }

        /* Estilo do botão Limpar */
        .container-botoes-registros {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-limpar-registros {
            background-color: var(--accent-color); /* Usa o azul padrão do seu sistema */
            color: white;
            border: none;
            padding: 12px 30px; 
            border-radius: 25px; /* Formato arredondado igual ao 'Salvar' */
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px; /* Espaço extra no final da página */
        }

        .btn-limpar-registros:hover {
            filter: brightness(1.1); /* Dá um leve brilho no azul ao passar o mouse */
            transform: scale(1.05);  /* Efeito de aumento suave */
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .btn-limpar-registros:active {
            transform: scale(0.98);
        }

        /* --- SEÇÃO DE REGISTROS SIMPLIFICADA --- */
        #secao-registros h1 {
            text-align: center;
            margin-top: 20px;
        }

        .container-lista-registros {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 10px;
        }

        .header-registros {
            padding: 15px 25px; /* Mesmo padding lateral dos itens */
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            border-radius: 12px 12px 0 0;
            text-align: left; /* Alinhado à esquerda como solicitado */
        }

        .item-registro {
            display: grid;
            grid-template-columns: 1fr auto; /* Nome ocupa o espaço e Data ocupa apenas o necessário */
            gap: 15px;
            padding: 18px 25px;
            margin: 10px 0;
            background-color: #f9f9f9;
            border-radius: 12px;
            transition: all 0.2s;
            align-items: center;
        }

        .item-registro:hover {
            background-color: #f0f7ff;
            transform: translateX(5px);
        }

        .registro-nome { 
            font-weight: 600; 
            color: var(--text-color);
        }

        .registro-data { 
            text-align: right; 
            color: #888; 
            font-size: 0.85rem; 
        }

        .container-busca-alterar {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .wrapper-input-select {
            position: relative;
            flex: 1;
            max-width: 500px;
        }

        #inputBuscaAlterar {
            width: 100%;
            padding: 12px 45px 12px 20px; /* Padding extra na direita para a seta */
            border-radius: 25px;
            border: 2px solid #eee;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
            text-align: left; /* Garante texto alinhado à esquerda */
        }

        #inputBuscaAlterar:focus {
            border-color: var(--accent-color);
        }

        .seta-busca-alterar {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            cursor: pointer;
            /* Filtro para deixar o ícone azul (aproximado do seu --accent-color) */
            filter: invert(18%) sepia(88%) saturate(3452%) hue-rotate(209deg) brightness(91%) contrast(101%);
        }

        /* Padronização do Placeholder */
        #inputBuscaAlterar::placeholder {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1rem;
            color: #999;
        }

        #listaSugestoes {
            position: absolute;
            top: calc(100% + 5px);
            width: 100%;
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: left; /* Resultados alinhados à esquerda */
        }

        .sugestao-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 0.95rem;
            border-bottom: 1px solid #f9f9f9;
        }

        .sugestao-item:hover {
            background-color: #f0f7ff;
            color: var(--accent-color);
        }

        .btn-prosseguir {
            padding: 12px 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 25px; /* Arredondado para combinar com o input */
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            height: 45px; /* Alinha a altura com o input */
            display: flex;
            align-items: center;
        }

        .btn-prosseguir:disabled {
            background-color: #0047ab;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Estilos para os Alertas (Toasts) */
        .toast-sucesso, .toast-erro {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 10000;
            transition: all 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center; /* <-- ADICIONE ESTA LINHA */
            text-align: center;
        }

        .toast-sucesso {
            background-color: #28a745; /* Verde */
        }

        .toast-erro {
            background-color: #dc3545; /* Vermelho */
        }

        .toast-hidden {
            top: -100px; /* Esconde para cima */
            opacity: 0;
        }

        @media (max-width: 768px) {
            #formAdicionar {
                display: flex !important; /* Essencial para o 'order' funcionar */
                flex-direction: column !important;
                gap: 20px !important;
                width: 100% !important;
            }

            #bloco-dados-produto { 
                order: 1; 
                width: 100% !important;
            }

            #bloco-estoques-cores { 
                order: 2; 
                width: 100% !important;
            }

            #btn-salvar-produto { 
                order: 3; 
                width: 100% !important;
                margin-top: 10px;
                padding: 15px !important;
            }
            
            /* Garante que os retângulos das cores ocupem a largura toda no mobile */
            [id^="container-cores-"] {
                grid-template-columns: 1fr !important; 
            }
        }

        @media (min-width: 769px) {
            #btn-salvar-produto {
                grid-column: 1;
                margin-top: -10px;
            }
        }

        /* Variáveis de Cores (Inspiradas no seu anexo) */
        :root {
            --bg-color: #ffffff;      /* Mude de #121212 para branco */
            --sidebar-color: #f4f4f4; /* Um cinza bem clarinho para o menu se destacar do fundo */
            --accent-color: #0047ab;  /* Azul (ex: Azul Cobalto) no lugar do Rosa */
            --text-color: #333333;    /* Um cinza escuro/preto para as letras aparecerem no fundo branco */
            --sidebar-width: 70px;
            --sidebar-expanded: 240px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
        }

        /* Estrutura do Menu Lateral */
        #sidebar {
            background-color: var(--sidebar-color);
            width: var(--sidebar-width);
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--accent-color);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            position: relative;
        }

        /* Expande ao passar o rato */
        #sidebar:hover {
            width: var(--sidebar-expanded);
        }

        /* Item do Menu (O Ícone Hambúrguer) */
        .sidebar-item {
            display: flex;
            align-items: center;
            height: 70px;
            padding: 0 15px;
            cursor: pointer;
            overflow: hidden;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            /* Isso pega a sua variável --accent-color e aplica 10% de opacidade */
            background-color: color-mix(in srgb, var(--accent-color), transparent 90%);
        }

        .sidebar-item img {
            width: 40px;
            height: 40px;
            min-width: 40px; /* Impede o ícone de encolher */
            object-fit: contain;
        }

        .sidebar-item span {
            margin-left: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--text-color);
        }

        /* Mostra o texto quando a barra expande */
        #sidebar:hover .sidebar-item span {
            opacity: 1;
        }

        /* Conteúdo Principal */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            font-size: 2rem;
        }

/* Estilo para o Mobile */
@media (max-width: 768px) {
    #sidebar {
        position: fixed; /* Fixado sobre o conteúdo */
        left: -280px;    /* Escondido totalmente à esquerda */
        width: 280px !important; /* Largura maior no celular */
        height: 100vh;
        z-index: 2000;
        transition: left 0.3s ease;
    }

    /* Quando o menu tiver a classe 'ativo', ele aparece */
    #sidebar.ativo {
        left: 0;
    }

    /* Aumenta o tamanho dos itens e ícones no celular */
    .sidebar-item {
        height: 80px; /* Item mais alto para facilitar o toque */
        padding: 0 20px;
    }

    .sidebar-item img {
        width: 50px;  /* Ícones maiores */
        height: 50px;
    }

    .sidebar-item span {
        opacity: 1 !important; /* Texto sempre visível no celular */
        font-size: 1.3rem;     /* Fonte maior */
    }

    main {
        padding: 20px;
    }

    /* Botão Flutuante (Hambúrguer) */
.btn-menu-movel {
    display: flex;
    position: absolute; 
    top: 10px;          /* Dei uma leve folga do topo */
    right: -60px;       /* Ajustado para não ficar colado na borda da tela */
    width: 50px;        /* Reduzi um pouco para o design da borda ficar elegante */
    height: 50px;
    z-index: 3000;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    
    /* O Design que você quer */
    background-color: #ffffff;
    border: 1px solid var(--accent-color);
    border-radius: 8px;
    
    /* Suaviza a aparição */
    transition: all 0.3s ease;
}

    .btn-menu-movel img {
        width: 40px;        /* Mesmo tamanho dos ícones do menu */
        height: 40px;
        /* Se o teu ícone for preto e o fundo do site for branco, não precisas de filtro.
           Se o ícone não aparecer, podes tentar usar: filter: invert(1); */
    }

    /* Ajuste para o conteúdo principal não ficar por baixo do ícone */
    main {
        padding-top: 80px; /* Dá espaço para o ícone no topo */
    }
}

/* Esconde o botão flutuante no Desktop */
@media (min-width: 769px) {
    .btn-menu-movel {
        display: none;
    }
}

        /* Estilo do Campo de Busca */
        .busca-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
#inputBusca {
    width: 100%;
    max-width: 700px;
    /* Mantive seus 12px (cima/baixo) e 20px (esquerda), 
       e adicionei 90px na direita para o texto não bater nos ícones */
    padding: 12px 90px 12px 20px; 
    
    border: 2px solid #eee;
    border-radius: 25px;
    outline: none;
    font-size: 1rem;
    transition: border-color 0.3s;
    
    /* Garante que o padding não quebre o tamanho do input */
    box-sizing: border-box; 
}

        #inputBusca:focus {
            border-color: var(--accent-color);
        }

        /* Container relativo para o ícone ficar dentro do input */
        .busca-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
        }

        /* Ícone de Filtro */
        .icone-filtro-busca {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            cursor: pointer;
        }

        /* Menu de Categorias */
        .menu-filtro {
            display: none;
            position: absolute;
            top: 110%;
            right: 0;         /* Alinha a borda direita do menu com a borda direita do campo */
            left: auto;       /* Remove o alinhamento à esquerda anterior */
            width: 300px;     /* Define o tamanho fixo desejado */
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
        }

        .menu-filtro.ativo { display: block; }

        .item-categoria {
            padding: 10px 20px;
            cursor: pointer;
        }

        /* Estilo para a categoria selecionada no menu */
        .item-categoria.ativo {
            font-weight: bold;
            color: var(--accent-color);
            background-color: #f0f7ff; /* Um leve destaque de fundo */
        }

        .item-categoria:hover { background-color: #f4f4f4; }

        /* Container que organiza os cards um ao lado do outro */
        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

@media (max-width: 480px) {

        /* Força 2 colunas rigorosamente iguais */
        grid-template-columns: repeat(2, 1fr) !important; 
        gap: 10px !important;

        display: grid !important;
    }

    .card-container {
        width: 100% !important;
        min-height: 240px !important;

        filter: none !important;

    }

    }

    }

    .info-produto h3 {

    .card-back div[style*="grid-template-columns"] { gap: 4px !important; }

    .card-back span[style*="border-radius: 50%"] { width: 12px !important; height: 12px !important; margin-right: 3px !important; }

.card-container {
    background-color: transparent;
    width: 100%;
    /* Remova min-height fixo e deixe o conteúdo ditar o tamanho */
    height: auto; 
    perspective: 1000px;
    cursor: pointer;
}

.card-body {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border-radius: 12px;
    /* Técnica para sobrepor frente e verso sem absolute puro que corta */
    display: grid; 
}

        /* Quando o JS colocar a classe 'girado', ele executa o giro */
        .card-container.girado .card-body {
            transform: rotateY(180deg);
        }

.card-front, .card-back {
    /* Em vez de absolute fixo, usamos grid-area para um ficar sobre o outro */
    grid-area: 1 / 1 / 2 / 2; 
    width: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    border: 1px solid #eee;
    background-color: white;
    display: flex;
    flex-direction: column;
}

        /* Face da Frente */
        .card-front {
            display: flex;
            flex-direction: column;
        }

        /* Face de Trás (Verso) */
        .card-back {
            transform: rotateY(180deg); /* Já começa invertida */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fcfcfc;
        }

        .card-produto:hover {
            transform: translateY(-5px);
        }

/* Localize e substitua/atualize estas regras */

.card-front {
    display: flex;
    flex-direction: column;
    height: 100%;
    /* Impede que os itens internos tentem "esticar" para ocupar o card todo */
    justify-content: flex-start; 
}

.foto-quadrada {
    width: 100%;
    /* Força o navegador a manter a proporção 1:1 baseada na largura */
    aspect-ratio: 1 / 1; 
    overflow: hidden;
    background-color: #f9f9f9;
    /* IMPORTANTE: Impede que o flexbox estique a imagem verticalmente */
    flex-grow: 0;
    flex-shrink: 0;
}

.foto-quadrada img {
    width: 100%;
    height: 100%;
    /* Garante que a imagem preencha o quadrado sem distorcer */
    object-fit: cover; 
    display: block;
}

        /* Texto dentro do card */

            padding: 15px;
        }

        .info-produto h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #0047ab;
            
            /* Configuração para as 2 linhas com reticências (...) */
