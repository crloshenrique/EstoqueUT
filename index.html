<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Unter Tech</title>
    <style>

        /* Estilos para os Alertas (Toasts) */
.toast-sucesso, .toast-erro {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    z-index: 10000;
    transition: all 0.5s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 10px;
}

.toast-sucesso {
    background-color: #28a745; /* Verde */
}

.toast-erro {
    background-color: #dc3545; /* Vermelho */
}

.toast-hidden {
    top: -100px; /* Esconde para cima */
    opacity: 0;
}

@media (max-width: 768px) {
    #formAdicionar {
        display: flex !important; /* Essencial para o 'order' funcionar */
        flex-direction: column !important;
        gap: 20px !important;
        width: 100% !important;
    }

    #bloco-dados-produto { 
        order: 1; 
        width: 100% !important;
    }

    #bloco-estoques-cores { 
        order: 2; 
        width: 100% !important;
    }

    #btn-salvar-produto { 
        order: 3; 
        width: 100% !important;
        margin-top: 10px;
        padding: 15px !important;
    }
    
    /* Garante que os retângulos das cores ocupem a largura toda no mobile */
    [id^="container-cores-"] {
        grid-template-columns: 1fr !important; 
    }
}

@media (min-width: 769px) {
    #btn-salvar-produto {
        grid-column: 1;
        margin-top: -10px;
    }
}

        /* Variáveis de Cores (Inspiradas no seu anexo) */
        :root {
            --bg-color: #ffffff;      /* Mude de #121212 para branco */
            --sidebar-color: #f4f4f4; /* Um cinza bem clarinho para o menu se destacar do fundo */
            --accent-color: #0047ab;  /* Azul (ex: Azul Cobalto) no lugar do Rosa */
            --text-color: #333333;    /* Um cinza escuro/preto para as letras aparecerem no fundo branco */
            --sidebar-width: 70px;
            --sidebar-expanded: 240px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
        }

        /* Estrutura do Menu Lateral */
        #sidebar {
            background-color: var(--sidebar-color);
            width: var(--sidebar-width);
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--accent-color);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            position: relative;
        }

        /* Expande ao passar o rato */
        #sidebar:hover {
            width: var(--sidebar-expanded);
        }

        /* Item do Menu (O Ícone Hambúrguer) */
        .sidebar-item {
            display: flex;
            align-items: center;
            height: 70px;
            padding: 0 15px;
            cursor: pointer;
            overflow: hidden;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            /* Isso pega a sua variável --accent-color e aplica 10% de opacidade */
            background-color: color-mix(in srgb, var(--accent-color), transparent 90%);
        }

        .sidebar-item img {
            width: 40px;
            height: 40px;
            min-width: 40px; /* Impede o ícone de encolher */
            object-fit: contain;
        }

        .sidebar-item span {
            margin-left: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--text-color);
        }

        /* Mostra o texto quando a barra expande */
        #sidebar:hover .sidebar-item span {
            opacity: 1;
        }

        /* Conteúdo Principal */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            font-size: 2rem;
        }

/* Estilo para o Mobile */
@media (max-width: 768px) {
    #sidebar {
        position: fixed; /* Fixado sobre o conteúdo */
        left: -280px;    /* Escondido totalmente à esquerda */
        width: 280px !important; /* Largura maior no celular */
        height: 100vh;
        z-index: 2000;
        transition: left 0.3s ease;
    }

    /* Quando o menu tiver a classe 'ativo', ele aparece */
    #sidebar.ativo {
        left: 0;
    }

    /* Aumenta o tamanho dos itens e ícones no celular */
    .sidebar-item {
        height: 80px; /* Item mais alto para facilitar o toque */
        padding: 0 20px;
    }

    .sidebar-item img {
        width: 50px;  /* Ícones maiores */
        height: 50px;
    }

    .sidebar-item span {
        opacity: 1 !important; /* Texto sempre visível no celular */
        font-size: 1.3rem;     /* Fonte maior */
    }

    main {
        padding: 20px;
    }

    /* Botão Flutuante (Hambúrguer) */
.btn-menu-movel {
        display: flex;
        position: absolute;  /* Muda de fixed para absolute */
        top: 0;
        right: -70px;       /* Joga o ícone para fora da lateral direita da barra */
        width: 70px;
        height: 70px;
        background-color: transparent; 
        border: none;
        z-index: 3000;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    .btn-menu-movel img {
        width: 40px;        /* Mesmo tamanho dos ícones do menu */
        height: 40px;
        /* Se o teu ícone for preto e o fundo do site for branco, não precisas de filtro.
           Se o ícone não aparecer, podes tentar usar: filter: invert(1); */
    }

    /* Ajuste para o conteúdo principal não ficar por baixo do ícone */
    main {
        padding-top: 80px; /* Dá espaço para o ícone no topo */
    }
}

/* Esconde o botão flutuante no Desktop */
@media (min-width: 769px) {
    .btn-menu-movel {
        display: none;
    }
}

        /* Estilo do Campo de Busca */
        .busca-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        #inputBusca {
            width: 100%;
            max-width: 700px;
            padding: 12px 20px;
            border: 2px solid #eee;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        #inputBusca:focus {
            border-color: var(--accent-color);
        }

        /* Container relativo para o ícone ficar dentro do input */
        .busca-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
        }

        /* Ícone de Filtro */
        .icone-filtro-busca {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            cursor: pointer;
        }

        /* Menu de Categorias */
        .menu-filtro {
            display: none;
            position: absolute;
            top: 110%;
            right: 0;         /* Alinha a borda direita do menu com a borda direita do campo */
            left: auto;       /* Remove o alinhamento à esquerda anterior */
            width: 300px;     /* Define o tamanho fixo desejado */
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
        }

        .menu-filtro.ativo { display: block; }

        .item-categoria {
            padding: 10px 20px;
            cursor: pointer;
        }

        /* Estilo para a categoria selecionada no menu */
        .item-categoria.ativo {
            font-weight: bold;
            color: var(--accent-color);
            background-color: #f0f7ff; /* Um leve destaque de fundo */
        }

        .item-categoria:hover { background-color: #f4f4f4; }

        /* Container que organiza os cards um ao lado do outro */
        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

@media (max-width: 480px) {
    .grid-produtos {
        /* Força 2 colunas rigorosamente iguais */
        grid-template-columns: repeat(2, 1fr) !important; 
        gap: 10px !important;
        padding: 10px !important;
        display: grid !important;
    }

    .card-container {
        width: 100% !important;
        min-height: 240px !important; 
        height: auto !important;
        filter: none !important; 
        margin-bottom: 10px;
    }

    .card-body {
        /* Importante: Voltar para grid para o efeito de giro funcionar sem achatar */
        display: grid !important;
        grid-template-columns: 100% !important;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important; 
        height: 100% !important;
        border-radius: 12px;
    }

    .card-front, .card-back {
        /* Garante que as faces ocupem a mesma célula do grid */
        grid-area: 1 / 1 / 2 / 2 !important;
        width: 100% !important;
        min-width: 0; /* Impede que o texto empurre a largura do card */
    }

    .card-front {
        display: flex !important;
        flex-direction: column !important;
        height: 100% !important;
    }

    .foto-quadrada {
        width: 100% !important;
        aspect-ratio: 1 / 1 !important;
        flex-shrink: 0 !important;
        height: auto !important;
    }

    .foto-quadrada img {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
    }

    .info-produto {
        padding: 10px !important; 
        display: flex !important;
        flex-direction: column !important;
        justify-content: flex-start !important; 
        flex-grow: 1 !important;
    }

    .info-produto h3 {
        font-size: 0.85rem;
        height: auto !important; 
        min-height: 2.2rem;
        line-height: 1.1rem;
        margin-bottom: 8px !important; 
        /* Garante que o texto longo não quebre o layout */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    
    .estoque-geral-container {
        display: flex;
        align-items: center; 
        gap: 10px; /* Reduzi um pouco para caber melhor em telas pequenas */
        margin-top: 5px;
    }

    /* Ajustes do Verso */
    .card-back div[style*="grid-template-columns"] { gap: 4px !important; }
    .card-back div[style*="background-color: #ebebeb"] { max-width: none !important; padding: 4px 2px !important; }
    .card-back span[style*="border-radius: 50%"] { width: 12px !important; height: 12px !important; margin-right: 3px !important; }
    .card-back strong { font-size: 0.8rem !important; min-width: 12px !important; }
}

.card-container {
    background-color: transparent;
    width: 100%;
    /* Remova min-height fixo e deixe o conteúdo ditar o tamanho */
    height: auto; 
    perspective: 1000px;
    cursor: pointer;
}

.card-body {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border-radius: 12px;
    /* Técnica para sobrepor frente e verso sem absolute puro que corta */
    display: grid; 
}

        /* Quando o JS colocar a classe 'girado', ele executa o giro */
        .card-container.girado .card-body {
            transform: rotateY(180deg);
        }

.card-front, .card-back {
    /* Em vez de absolute fixo, usamos grid-area para um ficar sobre o outro */
    grid-area: 1 / 1 / 2 / 2; 
    width: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    border: 1px solid #eee;
    background-color: white;
    display: flex;
    flex-direction: column;
}

        /* Face da Frente */
        .card-front {
            display: flex;
            flex-direction: column;
        }

        /* Face de Trás (Verso) */
        .card-back {
            transform: rotateY(180deg); /* Já começa invertida */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fcfcfc;
        }

        .card-produto:hover {
            transform: translateY(-5px);
        }

/* Localize e substitua/atualize estas regras */

.card-front {
    display: flex;
    flex-direction: column;
    height: 100%;
    /* Impede que os itens internos tentem "esticar" para ocupar o card todo */
    justify-content: flex-start; 
}

.foto-quadrada {
    width: 100%;
    /* Força o navegador a manter a proporção 1:1 baseada na largura */
    aspect-ratio: 1 / 1; 
    overflow: hidden;
    background-color: #f9f9f9;
    /* IMPORTANTE: Impede que o flexbox estique a imagem verticalmente */
    flex-grow: 0;
    flex-shrink: 0;
}

.foto-quadrada img {
    width: 100%;
    height: 100%;
    /* Garante que a imagem preencha o quadrado sem distorcer */
    object-fit: cover; 
    display: block;
}

        /* Texto dentro do card */
        .info-produto {
            padding: 15px;
        }

        .info-produto h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #0047ab;
            
            /* Configuração para as 2 linhas com reticências (...) */
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2; /* Versão para navegadores Chrome/Safari/Edge */
            line-clamp: 2;         /* Versão padrão oficial (resolve o aviso do editor) */
            
            overflow: hidden;
            text-overflow: ellipsis;
            
            /* Altura fixa para manter o alinhamento dos cards */
            line-height: 1.2rem; 
            height: 2.4rem; 
        }

        .estoques {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.9rem;
            color: #555;
        }

        /* Container que agrupa ícone + número */
        .estoque-geral-container {
            display: flex;
            align-items: center; /* Alinha verticalmente no centro */
            gap: 6px;            /* Espaço entre ícone e número */
            margin-top: 8px;
        }

/* --- PADRÃO: MOBILE (Ícone 15x15, Fonte 0.9rem) --- */
.icone-estoque-p {
    width: 15px;
    height: 15px;
    object-fit: contain;
    display: block; /* Remove espaços vazios abaixo da imagem */
}

.numero-estoque {
    font-size: 0.9rem;
    font-weight: bold;
    color: #333;
    display: flex;
    align-items: center; /* Alinhamento vertical central */
    line-height: 1;      /* Evita que a caixa do texto seja maior que o ícone */
}

/* --- AJUSTE: DESKTOP/PC (Telas maiores que 768px) --- */
@media (min-width: 769px) {
    .icone-estoque-p {
        width: 18px;  /* Tamanho que você solicitou */
        height: 18px;
    }

    .numero-estoque {
        font-size: 1rem; /* Aumentei um pouco a fonte para acompanhar o ícone maior */
    }
}
